import com.vanniktech.maven.publish.SonatypeHost

plugins {
    id 'java-library'
    id 'io.spring.dependency-management'
    id 'com.vanniktech.maven.publish'
    id 'signing'
}

version = projectVersion
description = 'Keycloak Spring Security WebFlux Starter - Auto-configuration for Reactive applications'

dependencies {
    // 자동 설정을 위한 필수 의존성
    api 'org.springframework.boot:spring-boot-autoconfigure'

    // ConfigurationProperties 스캔 및 메타데이터 생성을 위한 애노테이션 프로세서
    annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor'

    // Reactive 환경을 지원하기 위해 포함 (배포 시 자동으로 Maven 좌표로 변환됨)
    api project(':keycloak-spring-security-webflux')

    // 사용자의 프로젝트 환경에 따라 필요한 의존성만 전이되도록 compileOnly로 설정
    compileOnly 'org.springframework.boot:spring-boot-starter-webflux'

    // Spring Session Reactive Back-Channel 로그아웃 조건부 등록용
    // webflux 모듈과 동일하게 compileOnly: 사용자가 Spring Session을 사용할 때만 활성화
    compileOnly 'org.springframework.session:spring-session-core'

    // MDC Context Propagation 조건부 등록용 (ContextRegistry 임포트 필요)
    // webflux 모듈에서 implementation으로 전이되므로 compileOnly로 충분
    compileOnly 'io.micrometer:context-propagation'

    // OAuth2 Client (OIDC 로그인/로그아웃 빈 등록, ReactiveClientRegistrationRepository 조건부 처리)
    compileOnly 'org.springframework.security:spring-security-oauth2-client'

    // Test
    testImplementation 'org.springframework.boot:spring-boot-starter-webflux'
    testImplementation 'org.springframework:spring-test'
    testImplementation 'org.springframework.security:spring-security-oauth2-client'
}

signing {
    def secretFile = file("${rootDir}/secret.asc")
    def signingPassword = findProperty("signingInMemoryKeyPassword")
        ?: findProperty("signing.password")

    if (secretFile.exists()) {
        def signingKey = secretFile.text
        useInMemoryPgpKeys(signingKey, signingPassword as String)
        sign publishing.publications
    } else {
        println "secret.asc 파일이 없습니다. GPG 서명을 건너뜁니다."
    }
}

mavenPublishing {
    publishToMavenCentral(SonatypeHost.CENTRAL_PORTAL)
    signAllPublications()

    coordinates(mavenGroupId, "keycloak-spring-security-webflux-starter", version as String)

    pom {
        name = "keycloak-spring-security-webflux-starter"
        description = project.description
        inceptionYear = "2025"
        url = mavenProjectUrl

        licenses {
            license {
                name = "MIT License"
                url = "https://opensource.org/licenses/MIT"
                distribution = "repo"
            }
        }

        developers {
            developer {
                id = developerId
                name = developerName
                url = developerUrl
            }
        }

        scm {
            url = mavenProjectUrl
            connection = "scm:git:git://${mavenScmUrl}"
            developerConnection = "scm:git:ssh://git@${mavenScmUrl}"
        }
    }
}
